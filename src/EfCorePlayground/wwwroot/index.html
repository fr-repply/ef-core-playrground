<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EF Core 10 Playground</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="vendor/css/main.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="text-center">
                <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
                <p class="text-muted">Chargement du runtime .NET WASM...</p>
                <small class="text-muted">Premier chargement : ~30s • Suivants : instantané (cache)</small>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        Une erreur est survenue.
        <a href="." class="reload">Recharger</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="vendor/monaco/min/vs/loader.js"></script>
    <script type="module" src="vendor/js/main.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
