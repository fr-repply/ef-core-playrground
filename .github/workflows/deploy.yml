name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois, sans annuler le déploiement en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/EfCorePlayground/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: src/EfCorePlayground

      - name: Publish Blazor WASM
        run: dotnet publish src/EfCorePlayground/EfCorePlayground.csproj -c Release -o dist

      - name: Set base href for GitHub Pages sub-path
        run: |
          BASE_PATH="/${{ github.event.repository.name }}/"
          echo "Setting base href to: ${BASE_PATH}"
          sed -i "s|<base href=\"/\" />|<base href=\"${BASE_PATH}\" />|g" dist/wwwroot/index.html

      - name: Add .nojekyll (prevents GitHub Pages from ignoring _framework/)
        run: touch dist/wwwroot/.nojekyll

      - name: Copy index.html → 404.html (SPA client-side routing)
        run: cp dist/wwwroot/index.html dist/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

